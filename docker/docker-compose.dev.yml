# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/app
      - audio-tmp:/app/audio_output
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true
    # Remove GPU requirement for dev if not available
    deploy: {}

  postgres:
    ports:
      - "5432:5432"

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
