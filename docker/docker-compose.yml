services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - audio-tmp:/app/audio_output:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aria-net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aria:${POSTGRES_PASSWORD:-ariapass}@postgres:5432/aria
      - MONGO_URL=mongodb://aria:${MONGO_PASSWORD:-ariapass}@mongo:27017/aria?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - VISION_PROVIDER_ORDER=${VISION_PROVIDER_ORDER:-gemini,openai,claude,local}
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - DEBUG=${DEBUG:-false}
    volumes:
      - audio-tmp:/app/audio_output
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - aria-net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aria
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ariapass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aria-net

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: aria
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-ariapass}
      MONGO_INITDB_DATABASE: aria
    volumes:
      - mongo-data:/data/db
      - ./init-scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - aria-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - aria-net

  # Optional: expose backend via public tunnel (works across any network)
  # Usage: docker compose --profile tunnel up
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    profiles:
      - tunnel
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped
    networks:
      - aria-net

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  audio-tmp:

networks:
  aria-net:
    driver: bridge
